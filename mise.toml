# ========================================
# グローバル設定
# ========================================

[env]
_.file = [".env"]
_.path = ["./node_modules/.bin"]

# ========================================
# ツール
# ========================================

[tools]
node = "24.12"
pnpm = "10.33.0"
taplo = "0.10.0"
rust = "stable"
"cargo:https://github.com/rtk-ai/rtk" = { version = "tag:v0.34.2", crate = "rtk", bin = "rtk" }

# ========================================
# コマンド（実処理タスク）
# ========================================

[tasks.format]
description = "Biomeでソース全体を整形（自動修正あり）+ mise.tomlはTaploで整形"
run = ["pnpm run format", "taplo fmt mise.toml"]

[tasks."lint:types"]
description = "TypeScriptの型チェックのみ"
run = "pnpm exec tsc --noEmit"

[tasks."lint:biome"]
description = "Biomeのチェックのみ（自動修正なし）"
run = "pnpm run lint"

[tasks.test]
description = "Vitestでユニットテストを実行"
run = "pnpm run test"

[tasks."test:storybook"]
description = "Storybook(Vitest addon)を実行"
run = "pnpm run test:storybook"

[tasks.build]
description = "ビルドをRTK経由でコンパクトに実行"
run = "rtk err pnpm run build"

[tasks.clean]
description = "ビルド成果物を削除"
run = "pnpm run clean"

[tasks.lint]
description = "型チェック + Lint をRTK経由でコンパクトに実行"
run = ["rtk tsc --noEmit", "rtk err pnpm run lint"]

[tasks.show]
description = "RTKの導入状態を表示"
run = "rtk init --show"

# ========================================
# エイリアス（まとめ実行）
# ========================================

[tasks.check]
description = "ローカル確認をRTK経由でコンパクトに実行"
run = [{ task = "lint" }, { task = "test" }, { task = "test:storybook" }]

[tasks.ci]
description = "RTK経由のローカルCI確認"
run = [
  { task = "format" },
  { task = "lint" },
  { task = "test" },
  { task = "test:storybook" },
  { task = "build" },
  "echo '✅ RTK CI checks completed'",
]
